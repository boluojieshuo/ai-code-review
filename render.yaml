services:
  - type: web
    name: ai-code-review
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-db
          property: connectionString
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: LLM_MODEL
        value: qwen-plus
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: code-review-db
    plan: free
